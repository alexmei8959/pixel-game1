server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # 直接將 /pixel-game1/ 導向實體的 /pixel-game1/ 資料夾
    location /pixel-game1/ {
        # 處理 React SPA 路由，如果找不到實體檔案，就回傳該資料夾下的 index.html
        try_files $uri $uri/ /pixel-game1/index.html;
    }

    # 如果使用者只輸入根目錄 (/)，自動幫他重新導向到 /pixel-game1/
    location = / {
        return 301 /pixel-game1/;
    }

    # 處理靜態資源快取 (非必要，但能提升效能)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
